# Curriculum dei scenari per il loop di hill-climbing autonomo (Phase 6).
# Ordine: dal più semplice al più complesso. Claude Code attacca uno scenario
# alla volta, lo chiude (parità 100%), poi passa al successivo.
#
# Format:
#   - id: nome scenario (file in oracle/scenarios/<id>.json)
#     gate: subsystem che deve funzionare prima di poter chiudere lo scenario
#     priority: int (più basso = più prioritario)
#
# Lo scenario "blocca" (gate) i successivi se non chiuso. Marco vede progress
# in `STATUS.md` (sezione Phase 6).

stages:
  - id: attract_mode
    gate: rng                    # è il primo dove l'RNG viene esercitato
    priority: 10
    notes: |
      Power-on, niente input. Verifica che ROM bootstrap, vector table,
      RNG init, tile loader iniziale siano replicati. Se questo non chiude,
      tutto il resto è inutile.

  - id: level1_no_input
    gate: physics
    priority: 20
    notes: |
      Coin/start, nessun input dopo lo start. La biglia rotola da sola sul
      tilt iniziale del livello 1 fino a perdersi. Tutta la fisica (slope
      attractor) è esercitata; nemici ancora pochi.

  - id: level1_basic_movement
    gate: input
    priority: 30
    notes: |
      Pattern di movimento scriptato. Verifica subroutine input (additiva)
      + slope (attractor) coordinate.

  - id: level1_complete
    gate: ai
    priority: 40
    notes: |
      Sequenza che porta la biglia al traguardo. Esercita tutti i nemici
      del livello 1 + transition al livello 2.

  # Phase 6 successiva aggiungerà level2_*..level6_* + scenari edge:
  # - timer_zero (cosa succede se il timer scade)
  # - extra_life (al raggiungimento threshold di score)
  # - high_score_entry
  # - service_mode (DIP switch)
