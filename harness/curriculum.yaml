# Scenario curriculum for the autonomous hill-climbing loop (Phase 6).
# Order runs from simplest to most complex. Claude Code tackles one scenario
# at a time, closes it at 100% parity, then moves to the next one.
#
# Format:
#   - id: scenario name, backed by oracle/scenarios/<id>.json
#     gate: subsystem that must work before the scenario can close
#     priority: int (lower = higher priority)
#
# The scenario gates later scenarios until closed. Marco sees progress
# in `STATUS.md`.

stages:
  - id: attract_mode
    gate: rng                    # First scenario that exercises the RNG.
    priority: 10
    notes: |
      Power-on with no input. Verifies ROM bootstrap, vector table, RNG init,
      and the initial tile loader. If this does not close, later stages are not
      meaningful.

  - id: level1_no_input
    gate: physics
    priority: 20
    notes: |
      Coin/start with no input after start. The marble rolls by itself on the
      initial level-1 tilt until it is lost. This exercises slope physics while
      keeping enemies sparse.

  - id: level1_basic_movement
    gate: input
    priority: 30
    notes: |
      Scripted movement pattern. Verifies additive input routines plus slope
      attractor coordinates.

  - id: level1_complete
    gate: ai
    priority: 40
    notes: |
      Sequence that takes the marble to the finish. Exercises all level-1
      enemies plus the transition to level 2.

  # A later Phase 6 pass will add level2_*..level6_* plus edge scenarios:
  # - timer_zero (what happens when the timer expires)
  # - extra_life (when the score threshold is reached)
  # - high_score_entry
  # - service_mode (DIP switch)
