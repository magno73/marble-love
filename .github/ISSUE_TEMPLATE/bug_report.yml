name: Bug report
description: Report a reproducible problem in Marble Love.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not attach ROM files or copyrighted game assets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include URL parameters, controls pressed, and relevant commands.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Checks run
      description: List tests, probes, browser smoke checks, or console errors.
